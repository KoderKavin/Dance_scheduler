<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Dance Planner</title>
</head>
<body class="bg-gray-100 p-4">
    <h1 class="text-2xl font-bold mb-4">My Events</h1>
    
    <form action="/events" method="post" class="mb-6">
        <input type="text" name="name" placeholder="New Event Name" class="p-2 border rounded">
        <button type="submit" class="bg-blue-500 text-white p-2 rounded">Create</button>
    </form>

    <div class="space-y-2">
        {% for event in events %}
        <a href="/event/{{ event.id }}" class="block p-4 bg-white shadow rounded hover:bg-gray-50">
            {{ event.name }}
        </a>
        {% endfor %}
    </div>
</body>
</html>
